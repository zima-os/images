name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      actions: write
      packages: write
      contents: write

    steps:
      -
        name: Run GraphQL query to get tag
        uses: octokit/graphql-action@v3.x
        id: latest_tag
        with:
          variables: |
            repo: ZimaOS
            owner: IceWhaleTech
          query: |
            query tag($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                refs(
                  refPrefix: "refs/tags/"
                  last: 1
                  orderBy: {
                    field: TAG_COMMIT_DATE
                    direction: ASC
                  }
                ) {
                  edges {
                    node {
                      name
                    }
                  }
                }
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      -
        name: Parse tag from query output
        shell: bash
        run: |
          set -Eeuo pipefail

          latest_tag=$(
            jq -r '.repository.refs.edges[0].node.name // empty' \
              <<< '${{ steps.latest_tag.outputs.data }}'
          )

          if [ -z "$latest_tag" ]; then
            echo "Tag not found!" >&2
            exit 1
          fi

          latest_tag="${latest_tag#v}"

          latest_version="${latest_tag%%-*}"
          major="${latest_version%%.*}"
          minor="${latest_version#*.}"
          minor="${minor%%.*}"

          echo "Found tag: \"$latest_tag\""

          echo "skip=false" >> "$GITHUB_ENV"
          echo "latest_tag=$latest_tag" >> "$GITHUB_ENV"
          echo "latest_minor=$major.$minor" >> "$GITHUB_ENV"

      -
        name: Check if release exists
        if: env.skip == 'false'
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          if gh release view "v${latest_tag}" >/dev/null 2>&1; then
            echo "Release v${latest_tag} already exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release v${latest_tag} does not exist."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      -
        name: Install build dependencies
        if: env.skip == 'false' && steps.release.outputs.exists == 'false'
        shell: bash
        run: |
          set -Eeuo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cpio \
            gzip \
            xorriso

      -
        name: Download upstream release
        if: env.skip == 'false' && steps.release.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          upstream="IceWhaleTech/ZimaOS"

          release=$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/$upstream/releases/tags/$latest_tag"
          )

          iso_name=$(
            jq -r '
              .assets[]
              | select(.name | endswith("_installer.iso"))
              | .name
            ' <<< "$release" | head -n 1
          )

          img_name=$(
            jq -r '
              .assets[]
              | select(.name | endswith("_installer.img"))
              | .name
            ' <<< "$release" | head -n 1
          )

          if [ -z "$iso_name" ]; then
            echo "Installer ISO was not found in upstream release $latest_tag." >&2
            exit 1
          fi

          if [ -z "$img_name" ]; then
            echo "Installer IMG was not found in upstream release $latest_tag." >&2
            exit 1
          fi

          iso_url=$(
            jq -r --arg name "$iso_name" '
              .assets[]
              | select(.name == $name)
              | .browser_download_url
            ' <<< "$release"
          )

          img_url=$(
            jq -r --arg name "$img_name" '
              .assets[]
              | select(.name == $name)
              | .browser_download_url
            ' <<< "$release"
          )

          release_title=$(jq -r '.name // empty' <<< "$release")
          release_body=$(jq -r '.body // empty' <<< "$release")

          if [ -z "$iso_url" ]; then
            echo "Failed to determine the installer ISO URL." >&2
            exit 1
          fi

          if [ -z "$img_url" ]; then
            echo "Failed to determine the installer IMG URL." >&2
            exit 1
          fi

          [ -n "$release_title" ] || release_title="ZimaOS $latest_tag"

          printf '%s\n' "$release_body" > release-notes.md

          echo "release_title=$release_title" >> "$GITHUB_ENV"
          echo "iso_name=$iso_name" >> "$GITHUB_ENV"
          echo "img_name=$img_name" >> "$GITHUB_ENV"

          echo "Downloading $iso_name..."

          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-all-errors \
            --output "$iso_name" \
            "$iso_url"

          echo "Downloading $img_name..."

          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-all-errors \
            --output "$img_name" \
            "$img_url"

          test -s "$iso_name"
          test -s "$img_name"

      -
        name: Create unattended installer ISO
        if: env.skip == 'false' && steps.release.outputs.exists == 'false'
        shell: bash
        run: |
          set -Eeuo pipefail

          work="$RUNNER_TEMP/zima-autoinstall"
          original_iso="$GITHUB_WORKSPACE/$iso_name"
          output_iso="$GITHUB_WORKSPACE/$iso_name"

          rm -rf "$work"

          mkdir -p \
            "$work/initramfs" \
            "$work/verify/initramfs"

          echo "Extracting initramfs and GRUB configuration..."

          xorriso \
            -osirrox on \
            -indev "$original_iso" \
            -extract /install.amd/initrd "$work/initrd.gz" \
            -extract /boot/grub/grub.cfg "$work/grub.cfg"

          test -s "$work/initrd.gz"
          test -s "$work/grub.cfg"

          echo "Unpacking initramfs..."

          gzip -dc "$work/initrd.gz" |
            (
              cd "$work/initramfs"

              sudo cpio \
                -idm \
                --quiet \
                --no-absolute-filenames
            )

          sudo chown -R \
            "$(id -u):$(id -g)" \
            "$work/initramfs"

          if [ ! -e "$work/initramfs/usr/bin/whiptail" ]; then
            echo "The expected whiptail executable was not found." >&2
            exit 1
          fi

          if [ ! -e "$work/initramfs/usr/bin/installer" ]; then
            echo "The expected ZimaOS installer was not found." >&2
            exit 1
          fi

          echo "Installing automatic prompt handler..."

          mv \
            "$work/initramfs/usr/bin/whiptail" \
            "$work/initramfs/usr/bin/whiptail.real"

          cat > "$work/initramfs/usr/bin/whiptail" <<'EOF'
          #!/bin/sh

          arguments="$*"

          case "$arguments" in
            *"--gauge"*)
              cat >/dev/null
              exit 0
              ;;

            *"--yesno"*)
              exit 0
              ;;

            *"--menu"*"QUICK INSTALL MENU"*)
              printf '%s\n' "/dev/sda" >&2
              exit 0
              ;;

            *"--menu"*"Install Demo Data"*)
              printf '%s\n' "2" >&2
              exit 0
              ;;

            *"--menu"*)
              printf '%s\n' "1" >&2
              exit 0
              ;;

            *"--msgbox"*"Installation done"*)
              sync
              poweroff -f
              exit 0
              ;;

            *)
              exec /usr/bin/whiptail.real "$@"
              ;;
          esac
          EOF

          chmod 755 "$work/initramfs/usr/bin/whiptail"

          echo "Configuring immediate GRUB startup..."

          {
            printf '%s\n' \
              'set default=0' \
              'set timeout=0'

            cat "$work/grub.cfg"
          } > "$work/grub-autoinstall.cfg"

          echo "Repacking initramfs..."

          sudo bash -c '
            set -Eeuo pipefail

            source_dir="$1"
            destination="$2"

            cd "$source_dir"

            find . -print0 |
              LC_ALL=C sort -z |
              cpio \
                --null \
                --create \
                --format=newc \
                --owner=0:0 \
                --quiet |
              gzip -9n > "$destination"
          ' _ \
            "$work/initramfs" \
            "$work/initrd-autoinstall.gz"

          sudo chown \
            "$(id -u):$(id -g)" \
            "$work/initrd-autoinstall.gz"

          gzip -t "$work/initrd-autoinstall.gz"
          test -s "$work/initrd-autoinstall.gz"

          echo "Rebuilding ISO..."

          mv "$original_iso" "$work/original.iso"

          xorriso \
            -indev "$work/original.iso" \
            -outdev "$output_iso" \
            -boot_image any replay \
            -map "$work/initrd-autoinstall.gz" /install.amd/initrd \
            -map "$work/grub-autoinstall.cfg" /boot/grub/grub.cfg \
            -commit

          test -s "$output_iso"

          echo "Verifying patched ISO..."

          xorriso \
            -osirrox on \
            -indev "$output_iso" \
            -extract /install.amd/initrd "$work/verify/initrd.gz" \
            -extract /boot/grub/grub.cfg "$work/verify/grub.cfg"

          gzip -t "$work/verify/initrd.gz"

          grep -Fxq \
            'set default=0' \
            "$work/verify/grub.cfg"

          grep -Fxq \
            'set timeout=0' \
            "$work/verify/grub.cfg"

          echo "Verifying automatic prompt handler..."

          gzip -dc "$work/verify/initrd.gz" |
            (
              cd "$work/verify/initramfs"

              sudo cpio \
                -idm \
                --quiet \
                --no-absolute-filenames
            )

          grep -Fq \
            'QUICK INSTALL MENU' \
            "$work/verify/initramfs/usr/bin/whiptail"

          grep -Fq \
            'printf '\''%s\n'\'' "/dev/sda"' \
            "$work/verify/initramfs/usr/bin/whiptail"

          test -e \
            "$work/verify/initramfs/usr/bin/whiptail.real"

          echo
          echo "ISO verification completed successfully."

          printf 'Original ISO: '
          du -h "$work/original.iso" | cut -f1

          printf 'Patched ISO:  '
          du -h "$output_iso" | cut -f1

      -
        name: Publish release
        if: env.skip == 'false' && steps.release.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          test -s "$iso_name"
          test -s "$img_name"
          test -s release-notes.md

          gh release create "v${latest_tag}" \
            --title "$release_title" \
            --notes-file release-notes.md \
            "$iso_name" \
            "$img_name"

      -
        name: Send mail
        if: env.skip == 'false' && steps.release.outputs.exists == 'false' && success()
        uses: action-pack/send-mail@v1
        with:
          to: ${{ secrets.MAILTO }}
          from: GitHub Actions <${{ secrets.MAILTO }}>
          connection_url: ${{ secrets.MAIL_CONNECTION }}
          subject: ZimaOS ${{ env.latest_tag }} was released
          body: |
            ZimaOS ${{ env.latest_tag }} was released and its automatic installer was published.

            See https://github.com/${{ github.repository }}/releases/tag/v${{ env.latest_tag }}
